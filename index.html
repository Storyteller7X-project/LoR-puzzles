<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Runeterra Meta — LND</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,560;9..144,640&family=Inter:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0b0f17;--panel:#141b27;--panel2:#1a2230;--line:#27313f;--ink:#e9edf4;--muted:#94a1b5;--faint:#5f6c7e;

    --r-DE:#e8c25a;--r-FR:#6fd0e8;--r-IO:#ef7fae;--r-NX:#e0524e;--r-PZ:#f0973f;--r-SI:#38c39a;--r-BW:#e06a3a;--r-SH:#d9b84a;--r-MT:#9b7fe0;--r-BC:#7fce5a;--r-RU:#9aa6b8;}
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{background:radial-gradient(1100px 500px at 78% -10%,rgba(227,178,90,.07),transparent 60%),radial-gradient(900px 480px at 8% 0%,rgba(73,199,177,.06),transparent 55%),var(--bg);min-height:100vh}
  .wrap{max-width:1180px;margin:0 auto;padding:34px 22px 90px}

  h1{font-family:Fraunces,serif;font-weight:560;font-size:clamp(34px,6vw,58px);line-height:.98;margin:0;letter-spacing:-.01em}
  h1 em{font-style:italic;color:var(--teal)}
  .sub{margin:14px 0 0;color:var(--muted);font-size:14px;max-width:64ch}
  .meta{display:flex;flex-wrap:wrap;gap:10px 26px;margin-top:20px;font:500 12.5px/1 "Spline Sans Mono",monospace;color:var(--muted)}
  .meta b{color:var(--ink);font-weight:600}.meta .dot{color:var(--faint)}
  .controls{display:flex;flex-wrap:wrap;gap:22px;margin:30px 0 8px;padding:18px;background:var(--panel);border:1px solid var(--line);border-radius:14px}
  .ctl{display:flex;flex-direction:column;gap:8px}
  .ctl>span{font:600 10.5px/1 "Spline Sans Mono",monospace;letter-spacing:.16em;text-transform:uppercase;color:var(--faint)}
  .seg{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:3px}

  .seg button:hover{color:var(--ink)}
  .seg button[aria-pressed="true"]{background:var(--panel2);color:var(--ink);box-shadow:inset 0 0 0 1px var(--line)}
  .seg button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .viewbar{display:flex;align-items:center;gap:16px;margin-top:30px;flex-wrap:wrap}
  .tabs{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:4px}
  .tabs button{appearance:none;border:0;background:transparent;color:var(--muted);font-family:Fraunces,serif;font-weight:560;font-size:16px;padding:9px 18px;border-radius:8px;cursor:pointer}
  .tabs button[aria-pressed="true"]{background:var(--gold);color:#0b0f17}
  .tabs button:not([aria-pressed="true"]):hover{color:var(--ink)}
  .smooth{display:flex;align-items:center;gap:10px;margin-left:auto;font:500 11.5px/1 "Spline Sans Mono",monospace;color:var(--faint)}
  .smooth .seg button{padding:7px 11px;font-size:12px}
  section{margin-top:34px}
  .head{display:flex;align-items:baseline;gap:14px;margin-bottom:16px;flex-wrap:wrap}
  .head h2{font-family:Fraunces,serif;font-weight:560;font-size:22px;margin:0;letter-spacing:-.01em}
  .head .note{font:500 12px/1.4 "Spline Sans Mono",monospace;color:var(--faint)}
  .head .spacer{flex:1}
  .linkbtn{appearance:none;border:1px solid var(--line);background:var(--panel);color:var(--muted);font:500 12px/1 "Spline Sans Mono",monospace;padding:8px 12px;border-radius:8px;cursor:pointer}
  .linkbtn:hover{color:var(--ink);border-color:var(--gold)}
  .chips{display:inline-flex;gap:4px;vertical-align:middle}
  .chip{display:inline-flex;align-items:center;justify-content:center;width:22px;height:16px;border-radius:4px;font:600 9px/1 "Spline Sans Mono",monospace;color:#0b0f17}
  .scroll{overflow-x:auto;border:1px solid var(--line);border-radius:14px;background:var(--panel)}
  table.list{width:100%;border-collapse:collapse;font-size:13.5px}
  table.list th{text-align:left;font:600 10.5px/1 "Spline Sans Mono",monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);padding:14px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
  table.list th.num,table.list td.num{text-align:right;font-family:"Spline Sans Mono",monospace}
  table.list th.sortable{cursor:pointer;user-select:none}table.list th.sortable:hover{color:var(--muted)}table.list th.active{color:var(--gold)}
  table.list td{padding:11px 12px;border-bottom:1px solid rgba(39,49,63,.55)}
  table.list tbody tr{cursor:pointer}table.list tbody tr:hover{background:var(--panel2)}
  table.list tbody tr.sel{background:rgba(227,178,90,.08);box-shadow:inset 3px 0 0 var(--gold)}
  table.list .nm{display:flex;align-items:center;gap:10px;min-width:170px}
  .ci{font:500 11px/1 "Spline Sans Mono",monospace;color:var(--faint)}
  .pbar{height:3px;border-radius:2px;background:var(--line);margin-top:5px;overflow:hidden;width:90px}.pbar>i{display:block;height:100%;background:var(--teal)}
  table.mx{border-collapse:collapse;font:500 12px/1 "Spline Sans Mono",monospace}
  table.mx th,table.mx td{padding:0;text-align:center}
  table.mx thead th{position:sticky;top:0;background:var(--panel);color:var(--muted);font-weight:500;height:128px;vertical-align:bottom;z-index:1}
  table.mx thead th .v{writing-mode:vertical-rl;transform:rotate(180deg);padding:9px 0;max-height:116px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;cursor:pointer}
  table.mx thead th.lead{writing-mode:horizontal-tb;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);height:128px;vertical-align:bottom;padding-bottom:11px}
  table.mx tbody th{text-align:left;white-space:nowrap;padding:0 12px 0 16px;color:var(--ink);font-weight:500;font-size:12px;background:var(--panel);cursor:pointer}
  table.mx tbody th:hover{color:var(--gold)}
  table.mx td{width:40px;height:38px;border-left:1px solid rgba(39,49,63,.5);border-top:1px solid rgba(39,49,63,.5);color:#0b0f17;font-weight:600;position:relative}
  table.mx td.lead{background:var(--panel2);color:var(--ink);font-weight:500;width:52px}
  table.mx td.diag{background:repeating-linear-gradient(45deg,#1a2230,#1a2230 4px,#171e2a 4px,#171e2a 8px);color:var(--faint)}
  table.mx td.empty{color:var(--faint);background:var(--panel2)}
  table.mx td.low{opacity:.5}
  table.mx td.sig::after{content:"";position:absolute;left:3px;top:3px;width:5px;height:5px;border-radius:50%;background:#0b0f17;opacity:.55}
  .legend{display:flex;align-items:center;gap:8px;margin-top:14px;font:500 11px/1 "Spline Sans Mono",monospace;color:var(--faint);flex-wrap:wrap}
  .legend .scale{display:flex;height:9px;width:150px;border-radius:5px;overflow:hidden}.legend .scale i{flex:1}

  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .detail .dhead{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
  .detail .dtitle{font-family:Fraunces,serif;font-weight:560;font-size:22px;display:flex;align-items:center;gap:10px}
  .detail .close{margin-left:auto;appearance:none;border:1px solid var(--line);background:transparent;color:var(--muted);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:15px}
  .detail .close:hover{color:var(--ink);border-color:var(--gold)}
  .detail .stat{display:flex;gap:24px;margin:14px 0 4px;flex-wrap:wrap;font:500 13px/1.3 "Spline Sans Mono",monospace}
  .detail .stat b{display:block;font-family:Fraunces,serif;font-size:20px;font-weight:640;margin-top:3px}
  .detail .stat .k{color:var(--faint);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:26px;margin-top:20px}

  .mrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(39,49,63,.5)}
  .mrow .opp{flex:1;display:flex;align-items:center;gap:8px;min-width:0;font-size:13px}.mrow .opp span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mrow .pr{font:500 10.5px/1 "Spline Sans Mono",monospace;color:var(--faint);width:42px;text-align:right}
  .mrow .rec{font:500 11px/1 "Spline Sans Mono",monospace;color:var(--muted);width:42px;text-align:right}
  .mrow .wrcell{font:600 13px/1 "Spline Sans Mono",monospace;width:40px;text-align:right}
  .mrow .sigd{width:12px;color:var(--gold);font-size:11px;text-align:center}
  .submodes{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:3px;margin-bottom:20px;width:fit-content}
  .submodes button{appearance:none;border:0;background:transparent;color:var(--muted);font:500 13px/1 Inter,sans-serif;padding:9px 15px;border-radius:7px;cursor:pointer}
  .submodes button[aria-pressed="true"]{background:var(--teal);color:#0b0f17;font-weight:600}
  .submodes button:not([aria-pressed="true"]):hover{color:var(--ink)}
  .conqbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px;font:500 12.5px/1.4 "Spline Sans Mono",monospace;color:var(--muted)}
  select{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:500 12.5px/1 Inter,sans-serif;max-width:230px}
  .lineups{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
  .conq{border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:16px 18px}
  .conq.top{border-color:var(--gold)}
  .conq .rank{font:600 11px/1 "Spline Sans Mono",monospace;color:var(--faint);letter-spacing:.1em}
  .conq .cov{font-family:Fraunces,serif;font-weight:640;font-size:30px;line-height:1;margin:6px 0 2px}
  .conq .covk{font:500 10.5px/1 "Spline Sans Mono",monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
  .conq .decks{margin:14px 0 4px;display:flex;flex-direction:column;gap:8px}
  .conq .d{display:flex;align-items:center;gap:9px;font-size:13.5px;cursor:pointer}.conq .d:hover span{color:var(--gold)}
  .conq .d .lp{margin-left:auto;font:500 9px/1 "Spline Sans Mono",monospace;letter-spacing:.08em;color:var(--bad);border:1px solid var(--bad);border-radius:5px;padding:3px 5px}
  .conq .foot{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);font:500 11px/1.5 "Spline Sans Mono",monospace;color:var(--faint)}.conq .foot b{color:var(--muted)}
  .lpick{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:22px}
  @media (max-width:680px){.lpick{grid-template-columns:1fr}}
  .lpick .box{border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:16px 18px}
  .lpick h4{font:600 10.5px/1 "Spline Sans Mono",monospace;letter-spacing:.14em;text-transform:uppercase;margin:0 0 12px}
  .lpick h4.me{color:var(--teal)}.lpick h4.them{color:var(--bad)}
  .lpick .sel3{display:flex;flex-direction:column;gap:8px}.lpick select{max-width:none;width:100%}
  .banres{border:1px solid var(--gold);border-radius:16px;background:var(--panel);padding:22px;margin-bottom:24px}
  .banres .big{display:flex;gap:30px;flex-wrap:wrap;align-items:flex-end}
  .banres .mwin{font-family:Fraunces,serif;font-weight:640;font-size:46px;line-height:.9}
  .banres .mk{font:500 10.5px/1 "Spline Sans Mono",monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
  .banres .rec{font-size:14px;line-height:1.7}.banres .rec b{color:var(--ink)}
  .banres .ban{color:var(--good);font-weight:600}.banres .exposed{color:var(--bad);font-weight:600}
  .grid33{border-collapse:collapse;margin-top:18px;font:500 11px/1 "Spline Sans Mono",monospace}
  .grid33 th{color:var(--muted);font-weight:500;padding:6px 8px;text-align:right;font-size:11px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .grid33 thead th{text-align:center;vertical-align:bottom;color:var(--faint)}
  .grid33 td{width:46px;height:34px;text-align:center;color:#0b0f17;font-weight:600;border-radius:4px}
  .trend{display:grid;grid-template-columns:1fr 1fr;gap:26px}
  @media (max-width:680px){.trend{grid-template-columns:1fr}}
  .trow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(39,49,63,.5);cursor:pointer}
  .trow:hover{background:var(--panel2)}
  .trow .nm{flex:1;display:flex;align-items:center;gap:8px;min-width:0;font-size:13.5px}.trow .nm span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .trow .delta{font:600 12px/1 "Spline Sans Mono",monospace;width:60px;text-align:right}
  .trow .sub{font:500 10.5px/1 "Spline Sans Mono",monospace;color:var(--faint);width:96px;text-align:right}
  .empty-state{padding:46px 22px;text-align:center;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:14px}
  .empty-state b{color:var(--ink);display:block;margin-bottom:6px;font-size:15px}
  footer{margin-top:60px;padding-top:22px;border-top:1px solid var(--line);color:var(--faint);font:500 12px/1.7 "Spline Sans Mono",monospace}footer b{color:var(--muted)}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>

<body>
<div class="wrap">
  <div class="eyebrow">LND · Storyteller Project</div>
  <h1>Runeterra <em>Meta</em></h1>
  <p class="sub">Live ranked stats from the Riot API, with Bayes-smoothed win rates and a tournament toolkit: matchup analysis, lineup building, ban planning.</p>
  <div class="meta" id="meta"></div>
  <div class="controls">
    <div class="ctl"><span>Region</span><div class="seg" id="seg-region"></div></div>
    <div class="ctl"><span>Format</span><div class="seg" id="seg-format"></div></div>
    <div class="ctl"><span>Window</span><div class="seg" id="seg-window"></div></div>
  </div>
  <div class="viewbar">
    <div class="tabs" id="tabs"></div>
    <div class="smooth"><span id="kappa"></span><div class="seg" id="seg-smooth"></div></div>
  </div>
  <div id="content"></div>
  <footer id="foot"></footer>
</div>
<script>
const REGION_LABEL={europe:'EU',americas:'NA',asia:'APAC'};
const REGION_NAME={DE:'Demacia',FR:'Freljord',IO:'Ionia',NX:'Noxus',PZ:'Piltover & Zaun',SI:'Shadow Isles',BW:'Bilgewater',SH:'Shurima',MT:'Mount Targon',BC:'Bandle City',RU:'Runeterra'};
const FACTION_REF={FACTION_DEMACIA_NAME:'DE',FACTION_FRELJORD_NAME:'FR',FACTION_IONIA_NAME:'IO',FACTION_NOXUS_NAME:'NX',FACTION_PILTOVER_NAME:'PZ',FACTION_SHADOWISLES_NAME:'SI',FACTION_BILGEWATER_NAME:'BW',FACTION_SHURIMA_NAME:'SH',FACTION_MTTARGON_NAME:'MT',FACTION_BANDLECITY_NAME:'BC'};
const regionCode=f=>FACTION_REF[f]||(/^[A-Z]{2}$/.test(f)?f:'RU');
function normalizeLabel(l){const m=String(l).match(/^(.*?)\s*\(([^)]*)\)\s*$/);if(!m)return l;return `${m[1].trim()} (${[...new Set(m[2].split('/').map(s=>regionCode(s.trim())))].sort().join('/')})`;}
function regionsOf(l){const m=String(l).match(/\(([^)]*)\)\s*$/);return m?m[1].split('/'):[];}
function deckName(l){return l.replace(/\s*\([^)]*\)\s*$/,'');}
function champsOf(l){const n=deckName(l);if(/^champless$/i.test(n))return [];return n.split('/').map(c=>c.split(':')[0].trim());}
function chips(l){return `<span class="chips">`+regionsOf(l).map(r=>`<span class="chip" style="background:var(--r-${r},#9aa6b8)" title="${REGION_NAME[r]||r}">${r}</span>`).join('')+`</span>`;}
function esc(s){return String(s).replace(/'/g,"\\'");}
function wilson(w,n){if(!n)return[0,0];const z=1.96,p=w/n,d=1+z*z/n,c=p+z*z/(2*n),m=z*Math.sqrt(p*(1-p)/n+z*z/(4*n*n));return[(c-m)/d,(c+m)/d];}
function wrColor(wr){if(wr==null)return 'var(--mid)';const t=Math.max(0,Math.min(1,(wr-0.35)/0.30)),bad=[224,87,92],good=[70,184,138];const c=bad.map((b,i)=>Math.round(b+(good[i]-b)*t));return `rgb(${c[0]},${c[1]},${c[2]})`;}
function fmtWR(wr){return wr==null?'—':(wr*100).toFixed(0)+'%';}
function fmtCI(lo,hi){return `${(lo*100).toFixed(0)}–${(hi*100).toFixed(0)}`;}

const MIN_GAMES=3,META_MIN=0.01,CAND_N=14,FIELD_MIN=0.005;
const state={region:'all',format:'all',window:14,sort:'play',selected:null,view:'meta',smooth:true,requireDeck:'',conqMode:'build',myLineup:null,oppLineup:null};
let STATS=null,KAPPA=8;
const todayKey=()=>new Date().toISOString().slice(0,10);

function aggregate(){
  const days=STATS.days||{};
  const cutoff=state.window?new Date(Date.now()-(state.window-1)*864e5).toISOString().slice(0,10):STATS.patchStart;
  const today=todayKey();const deck={},mu={};const inWin=[];
  for(const[d,regs]of Object.entries(days)){if(d<cutoff||d>today)continue;inWin.push(d);
    for(const[reg,fmts]of Object.entries(regs)){if(state.region!=='all'&&reg!==state.region)continue;
      for(const[fmt,b]of Object.entries(fmts)){if(state.format!=='all'&&fmt!==state.format)continue;
        for(const[k,v]of Object.entries(b.deckGames||{})){const n=normalizeLabel(k);(deck[n]??={games:0,wins:0,byDay:{}});deck[n].games+=v.games;deck[n].wins+=v.wins;(deck[n].byDay[d]??={games:0,wins:0});deck[n].byDay[d].games+=v.games;deck[n].byDay[d].wins+=v.wins;}
        for(const[k,v]of Object.entries(b.matchups||{})){const i=k.indexOf('@@');if(i<0)continue;const nk=normalizeLabel(k.slice(0,i))+'@@'+normalizeLabel(k.slice(i+2));(mu[nk]??={games:0,wins:0});mu[nk].games+=v.games;mu[nk].wins+=v.wins;}
      }}}
  return {deck,mu,inWin:inWin.sort()};
}
function estimateKappa(mu){const ps=[],sv=[];for(const v of Object.values(mu)){if(v.games<2)continue;const p=v.wins/v.games;ps.push(p);sv.push(p*(1-p)/v.games);}
  if(ps.length<5)return 8;const mean=ps.reduce((a,b)=>a+b,0)/ps.length;const obs=ps.reduce((a,b)=>a+(b-mean)**2,0)/ps.length;const msv=sv.reduce((a,b)=>a+b,0)/sv.length;const tv=obs-msv;if(tv<=0)return 40;return Math.max(4,Math.min(40,0.25/tv-1));}
function muWR(mu,a,b){const e=mu[`${a}@@${b}`];if(state.smooth)return e?(e.wins+KAPPA/2)/(e.games+KAPPA):0.5;return e&&e.games?e.wins/e.games:null;}
function muCalc(mu,a,b){const v=muWR(mu,a,b);return v==null?0.5:v;}
function muGames(mu,a,b){const e=mu[`${a}@@${b}`];return e?e.games:0;}
function muSig(mu,a,b){const e=mu[`${a}@@${b}`];if(!e||!e.games)return false;const[lo,hi]=wilson(e.wins,e.games);return lo>0.5||hi<0.5;}

function computeDecks(deck,mu){
  const total=Object.values(deck).reduce((a,d)=>a+d.games,0);
  const decks=Object.entries(deck).map(([label,v])=>{
    const rawWR=v.games?v.wins/v.games:0;const wr=state.smooth?(v.wins+KAPPA/2)/(v.games+KAPPA):rawWR;let lo,hi;
    if(state.smooth){const a=v.wins+KAPPA/2,b=v.games-v.wins+KAPPA/2,m=a/(a+b),sd=Math.sqrt(a*b/((a+b)**2*(a+b+1)));lo=Math.max(0,m-1.96*sd);hi=Math.min(1,m+1.96*sd);}else{[lo,hi]=wilson(v.wins,v.games);}
    return {label,games:v.games,wins:v.wins,rawWR,wr,ciLo:lo,ciHi:hi,play:total?v.games/total:0,byDay:v.byDay};
  });
  decks.forEach(d=>{let num=0,den=0;for(const o of decks){if(o.label===d.label)continue;if(o.play<FIELD_MIN)continue;num+=o.play*muCalc(mu,d.label,o.label);den+=o.play;}d.expWR=den?num/den:null;});
  return {decks,total};
}

// ---- Conquest match-win (memoized minimax) ----
function makeMatchWin(mu){const memo=new Map();
  function mw(my,opp){if(!my.length)return 1;if(!opp.length)return 0;
    const key=my.join('|')+'#'+opp.join('|');if(memo.has(key))return memo.get(key);
    let best=-1;for(const i of my){let worst=2;for(const j of opp){const p=muCalc(mu,i,j);
      const v=p*mw(my.filter(x=>x!==i),opp)+(1-p)*mw(my,opp.filter(x=>x!==j));if(v<worst)worst=v;}if(worst>best)best=worst;}
    memo.set(key,best);return best;}
  return mw;}
function banHelper(M,O,mw){let bestO=null,bestVal=-1,theirBan=null;
  for(const o of O){let worst=2,wm=null;for(const m of M){const v=mw(M.filter(x=>x!==m),O.filter(x=>x!==o));if(v<worst){worst=v;wm=m;}}if(worst>bestVal){bestVal=worst;bestO=o;theirBan=wm;}}
  return {banTheir:bestO,theyBan:theirBan,matchWin:bestVal};}
function legalLineup(L){const seen=new Set();for(const d of L)for(const c of champsOf(d)){if(seen.has(c))return false;seen.add(c);}return true;}
function pickLineup(decks,exclude){const used=new Set(),out=[];for(const d of decks){if(out.length>=3)break;if(exclude&&exclude.has(d.label))continue;const ch=champsOf(d.label);if(ch.some(c=>used.has(c)))continue;ch.forEach(c=>used.add(c));out.push(d.label);}while(out.length<3)out.push('');return out;}

function fmt1(x){return (x*100).toFixed(1)+'%';}

// ---------------- COUNTER EXPLORER ----------------
function renderDetail(decks,mu,byLabel){
  if(!state.selected||!byLabel[state.selected])return '';
  const d=byLabel[state.selected];
  const rows=decks.filter(o=>o.label!==d.label).map(o=>{const wr=muWR(mu,d.label,o.label),g=muGames(mu,d.label,o.label);return {opp:o.label,play:o.play,wr,g,wins:(mu[`${d.label}@@${o.label}`]||{}).wins||0,sig:muSig(mu,d.label,o.label)};}).filter(r=>r.wr!=null||r.g>0);
  const W=r=>r.wr==null?0.5:r.wr;
  const beats=rows.filter(r=>W(r)>=0.5).sort((a,b)=>W(b)-W(a)||b.play-a.play).slice(0,10);
  const loses=rows.filter(r=>W(r)<0.5).sort((a,b)=>W(a)-W(b)||b.play-a.play).slice(0,10);
  const row=r=>`<div class="mrow"><div class="opp">${chips(r.opp)}<span>${deckName(r.opp)}</span></div><div class="sigd">${r.sig?'✓':''}</div><div class="pr">${fmt1(r.play)}</div><div class="rec">${r.g?r.wins+'/'+r.g:'—'}</div><div class="wrcell" style="color:${wrColor(W(r))}">${fmtWR(r.wr)}</div></div>`;
  return `<div class="detail"><div class="dhead"><div class="dtitle">${chips(d.label)} ${deckName(d.label)}</div><button class="close" onclick="clearSel()">✕</button></div>
    <div class="stat"><div><span class="k">Games</span><b>${d.games}</b></div><div><span class="k">Play rate</span><b>${fmt1(d.play)}</b></div>
      <div><span class="k">Win rate</span><b style="color:${wrColor(d.wr)}">${fmtWR(d.wr)}</b><span class="ci">${fmtCI(d.ciLo,d.ciHi)}</span></div>
      <div><span class="k">Exp WR vs field</span><b style="color:${wrColor(d.expWR)}">${fmtWR(d.expWR)}</b></div></div>
    <div class="cols"><div><h4 class="good">You're favored ▸ play more vs these</h4>${beats.length?beats.map(row).join(''):'<div class="ci" style="padding:10px 0">None recorded.</div>'}</div>
      <div><h4 class="bad">You're unfavored ▸ these answer you</h4>${loses.length?loses.map(row).join(''):'<div class="ci" style="padding:10px 0">None recorded.</div>'}</div></div>
    <div class="ci" style="margin-top:14px">✓ = statistically distinguishable from 50% · % = win rate vs that deck · then play rate &amp; record</div></div>`;
}

// ---------------- META ----------------
function renderMeta(decks,total,mu,byLabel){
  const maxPlay=Math.max(...decks.map(d=>d.play),1e-6);
  const sorted=decks.slice().sort((a,b)=>state.sort==='win'?(b.wr-a.wr||b.games-a.games):state.sort==='exp'?((b.expWR??0)-(a.expWR??0)||b.games-a.games):(b.games-a.games));
  const arrow=k=>state.sort===k?' ↓':'';
  const table=`<div class="scroll"><table class="list"><thead><tr><th>Archetype</th>
    <th class="num sortable ${state.sort==='play'?'active':''}" onclick="setSort('play')">Play${arrow('play')}</th><th class="num">Games</th>
    <th class="num sortable ${state.sort==='win'?'active':''}" onclick="setSort('win')">Win${arrow('win')}</th><th class="num">CI</th>
    <th class="num sortable ${state.sort==='exp'?'active':''}" onclick="setSort('exp')">Exp WR${arrow('exp')}</th></tr></thead><tbody>`+
    sorted.map(d=>`<tr class="${d.label===state.selected?'sel':''}" onclick="selDeck('${esc(d.label)}')"><td><div class="nm">${chips(d.label)}<span>${deckName(d.label)}</span></div></td>
    <td class="num">${fmt1(d.play)}<div class="pbar"><i style="width:${(d.play/maxPlay*100).toFixed(0)}%"></i></div></td>
    <td class="num" style="color:var(--muted)">${d.games}</td><td class="num" style="color:${wrColor(d.wr)}">${fmtWR(d.wr)}</td>
    <td class="num ci">${fmtCI(d.ciLo,d.ciHi)}</td><td class="num" style="color:${d.expWR!=null?wrColor(d.expWR):'var(--faint)'}">${fmtWR(d.expWR)}</td></tr>`).join('')+`</tbody></table></div>`;

  const top=decks.filter(d=>d.games>=MIN_GAMES).sort((a,b)=>b.games-a.games).slice(0,12);
  let mx;
  if(top.length<2){mx=`<div class="empty-state">Not enough decks with ${MIN_GAMES}+ games yet.</div>`;}
  else{const cell=(r,c)=>{if(r.label===c.label)return `<td class="diag">—</td>`;const wr=muWR(mu,r.label,c.label),g=muGames(mu,r.label,c.label);if(wr==null)return `<td class="empty">·</td>`;
    const e=mu[`${r.label}@@${c.label}`]||{wins:0,games:0},cls=(g>0&&g<3?'low ':'')+(muSig(mu,r.label,c.label)?'sig':'');const tip=g?`${e.wins}/${g}`:'no games (prior)';
    return `<td class="${cls.trim()}" style="background:${wrColor(wr)}" title="${deckName(r.label)} vs ${deckName(c.label)} — ${tip} · ${(wr*100).toFixed(0)}%">${(wr*100).toFixed(0)}</td>`;};
    mx=`<div class="scroll"><table class="mx"><thead><tr><th></th><th class="lead">N</th><th class="lead">Exp<br>WR</th>`+
      top.map(c=>`<th><div class="v" title="${c.label}" onclick="selDeck('${esc(c.label)}')">${deckName(c.label)}</div></th>`).join('')+`</tr></thead><tbody>`+
      top.map(r=>`<tr><th title="${r.label}" onclick="selDeck('${esc(r.label)}')">${deckName(r.label)}</th><td class="lead">${r.games}</td><td class="lead" style="color:${r.expWR!=null?wrColor(r.expWR):'var(--faint)'}">${fmtWR(r.expWR)}</td>`+
        top.map(c=>cell(r,c)).join('')+`</tr>`).join('')+`</tbody></table></div>
      <div class="legend"><span>Unfavored</span><span class="scale"><i style="background:${wrColor(.35)}"></i><i style="background:${wrColor(.5)}"></i><i style="background:${wrColor(.65)}"></i></span><span>Favored · row vs column · ● = significant (CI excludes 50%) · faded = thin</span></div>`;}

  // pocket picks
  const plays=decks.map(d=>d.play).sort((a,b)=>a-b);const med=plays[Math.floor(plays.length/2)]||0;
  const pocket=decks.filter(d=>d.play<=med&&d.games>=MIN_GAMES&&d.expWR!=null&&d.expWR>0.5).sort((a,b)=>b.expWR-a.expWR).slice(0,6);
  const pocketHtml=pocket.length?`<div class="scroll"><table class="list"><thead><tr><th>Sleeper</th><th class="num">Exp WR</th><th class="num">Play</th><th class="num">Games</th></tr></thead><tbody>`+
    pocket.map(d=>`<tr onclick="selDeck('${esc(d.label)}')"><td><div class="nm">${chips(d.label)}<span>${deckName(d.label)}</span></div></td><td class="num" style="color:${wrColor(d.expWR)}">${fmtWR(d.expWR)}</td><td class="num" style="color:var(--muted)">${fmt1(d.play)}</td><td class="num" style="color:var(--faint)">${d.games}</td></tr>`).join('')+`</tbody></table></div>`
    :`<div class="empty-state">No clear sleepers yet — needs more data (low-play decks with a winning record vs the field).</div>`;

  return renderDetail(decks,mu,byLabel)+`
    <section><div class="head"><h2>Meta</h2><span class="note">${decks.length} archetypes · ${total} appearances · click a deck for matchups</span><span class="spacer"></span><button class="linkbtn" onclick="downloadCSV()">Download CSV</button></div>${table}</section>
    <section><div class="head"><h2>Matchup matrix</h2><span class="note">top ${Math.min(12,top.length)} by play rate</span></div>${mx}</section>
    <section><div class="head"><h2>Pocket picks</h2><span class="note">under-played decks that beat the field — tournament surprises</span></div>${pocketHtml}</section>`;
}

// ---------------- CONQUEST ----------------
function deckOptions(decks,selected){return `<option value="">— pick deck —</option>`+decks.slice().sort((a,b)=>b.games-a.games).map(d=>`<option value="${d.label}" ${d.label===selected?'selected':''}>${deckName(d.label)} (${regionsOf(d.label).join('/')})</option>`).join('');}
function lineupBox(cls,title,who,arr,decks){return `<div class="box"><h4 class="${cls}">${title}</h4><div class="sel3">`+
  [0,1,2].map(i=>`<select onchange="setLineup('${who}',${i},this.value)">${deckOptions(decks,arr[i])}</select>`).join('')+`</div></div>`;}

function renderConquest(decks,mu){
  const mw=makeMatchWin(mu);
  const cand=decks.slice().sort((a,b)=>b.games-a.games).slice(0,CAND_N);
  const sub=`<div class="submodes" id="submodes">
    <button data-v="build" aria-pressed="${state.conqMode==='build'}" onclick="setConq('build')">Build vs meta</button>
    <button data-v="counter" aria-pressed="${state.conqMode==='counter'}" onclick="setConq('counter')">Counter a lineup</button>
    <button data-v="ban" aria-pressed="${state.conqMode==='ban'}" onclick="setConq('ban')">Ban helper</button></div>`;

  if(state.conqMode==='build'){
    const field=decks.filter(d=>d.play>=FIELD_MIN);
    const coverage=L=>{let num=0,den=0;for(const D of field){const best=Math.max(...L.map(x=>muCalc(mu,x,D.label)));num+=D.play*best;den+=D.play;}return den?num/den:0;};
    const weakest=L=>{let w=null,wv=2;for(const D of field){const best=Math.max(...L.map(x=>muCalc(mu,x,D.label)));if(best<wv){wv=best;w=D;}}return {D:w,v:wv};};
    const lineups=[];for(let i=0;i<cand.length;i++)for(let j=i+1;j<cand.length;j++)for(let m=j+1;m<cand.length;m++){const L=[cand[i].label,cand[j].label,cand[m].label];if(state.requireDeck&&!L.includes(state.requireDeck))continue;if(legalLineup(L))lineups.push(L);}
    const scored=lineups.map(L=>{const cov=coverage(L);const subs=L.map((_,idx)=>coverage(L.filter((_,k)=>k!==idx)));const pb=Math.min(...subs);return {L,cov,postBan:pb,linchpin:L[subs.indexOf(pb)],weak:weakest(L)};}).sort((a,b)=>b.cov-a.cov).slice(0,12);
    const opts=`<option value="">— any deck —</option>`+decks.slice().sort((a,b)=>b.games-a.games).map(d=>`<option value="${d.label}" ${d.label===state.requireDeck?'selected':''}>${deckName(d.label)} (${regionsOf(d.label).join('/')})</option>`).join('');
    const cards=scored.length?`<div class="lineups">`+scored.map((x,i)=>`<div class="conq ${i===0?'top':''}"><div class="rank">#${i+1}</div><div class="cov" style="color:${wrColor(x.cov)}">${fmt1(x.cov)}</div><div class="covk">field coverage</div>
      <div class="decks">${x.L.map(l=>`<div class="d" onclick="selDeckGo('${esc(l)}')">${chips(l)}<span>${deckName(l)}</span>${l===x.linchpin?'<span class="lp">ban bait</span>':''}</div>`).join('')}</div>
      <div class="foot">After worst ban: <b>${fmt1(x.postBan)}</b> · weakest vs <b>${x.weak.D?deckName(x.weak.D.label):'—'}</b> (${(x.weak.v*100).toFixed(0)}%)</div></div>`).join('')+`</div>`:`<div class="empty-state"><b>No legal lineups</b>Widen the window or clear the required deck.</div>`;
    return sub+`<div class="conqbar"><span>Require deck:</span><select onchange="setRequire(this.value)">${opts}</select><span style="color:var(--faint)">champion-lock enforced · coverage = your best deck's win% into the average opponent</span></div>
      <section style="margin-top:0"><div class="head"><h2>Best lineups vs the meta</h2><span class="note">top legal 3-deck combos from the ${cand.length} most-played</span></div>${cards}</section>`;
  }

  if(state.requireDeck){/*noop*/}
  if(!state.oppLineup)state.oppLineup=pickLineup(decks,null);
  if(!state.myLineup)state.myLineup=pickLineup(decks,new Set(state.oppLineup.filter(Boolean)));

  if(state.conqMode==='counter'){
    const O=state.oppLineup.filter(Boolean);
    let body;
    if(O.length<3){body=`<div class="empty-state">Pick the opponent's three decks above.</div>`;}
    else{const lineups=[];for(let i=0;i<cand.length;i++)for(let j=i+1;j<cand.length;j++)for(let m=j+1;m<cand.length;m++){const L=[cand[i].label,cand[j].label,cand[m].label];if(legalLineup(L))lineups.push(L);}
      const scored=lineups.map(L=>({L,...banHelper(L,O,mw)})).sort((a,b)=>b.matchWin-a.matchWin).slice(0,9);
      body=`<div class="lineups">`+scored.map((x,i)=>`<div class="conq ${i===0?'top':''}"><div class="rank">#${i+1}</div><div class="cov" style="color:${wrColor(x.matchWin)}">${fmt1(x.matchWin)}</div><div class="covk">match win vs them</div>
        <div class="decks">${x.L.map(l=>`<div class="d" onclick="selDeckGo('${esc(l)}')">${chips(l)}<span>${deckName(l)}</span></div>`).join('')}</div>
        <div class="foot">Ban their <b>${deckName(x.banTheir)}</b> · they'll likely ban your <b>${deckName(x.theyBan)}</b></div></div>`).join('')+`</div>`;}
    return sub+`<div class="lpick">${lineupBox('them','Opponent lineup','opp',state.oppLineup,decks)}<div class="box" style="display:flex;align-items:center;justify-content:center;color:var(--faint);font:500 12px/1.6 'Spline Sans Mono',monospace;text-align:center">Pick the 3 decks you expect to face.<br>We find your best legal counter-lineups.</div></div>
      <section style="margin-top:0"><div class="head"><h2>Best counter-lineups</h2><span class="note">scored by expected match win after optimal bans</span></div>${body}</section>`;
  }

  // ban helper
  const M=state.myLineup.filter(Boolean),O=state.oppLineup.filter(Boolean);
  let res;
  if(M.length<3||O.length<3){res=`<div class="empty-state">Pick all three decks for both lineups.</div>`;}
  else{const bh=banHelper(M,O,mw);const meIllegal=!legalLineup(M),themIllegal=!legalLineup(O);
    const g=`<table class="grid33"><thead><tr><th></th>${O.map(o=>`<th title="${o}">${deckName(o)}</th>`).join('')}</tr></thead><tbody>`+
      M.map(m=>`<tr><th title="${m}">${deckName(m)}</th>${O.map(o=>{const wr=muCalc(mu,m,o);return `<td style="background:${wrColor(wr)}">${(wr*100).toFixed(0)}</td>`;}).join('')}</tr>`).join('')+`</tbody></table>`;
    res=`<div class="banres"><div class="big"><div><div class="mk">Expected match win</div><div class="mwin" style="color:${wrColor(bh.matchWin)}">${fmt1(bh.matchWin)}</div></div>
      <div class="rec"><div class="mk">Plan</div>Ban their <span class="ban">${deckName(bh.banTheir)}</span><br>They'll likely ban your <span class="exposed">${deckName(bh.theyBan)}</span></div></div>
      ${meIllegal||themIllegal?`<div class="ci" style="color:var(--bad);margin-top:12px">⚠ ${meIllegal?'Your':'Opponent'} lineup shares a champion (not champion-lock legal).</div>`:''}
      <div class="ci" style="margin-top:14px">Your decks (rows) win% vs theirs (cols):</div>${g}</div>`;}
  return sub+`<div class="lpick">${lineupBox('me','Your lineup','my',state.myLineup,decks)}${lineupBox('them','Opponent lineup','opp',state.oppLineup,decks)}</div>
    <section style="margin-top:0"><div class="head"><h2>Ban helper</h2><span class="note">optimal ban &amp; expected result, both sides champion-locked</span></div>${res}</section>`;
}

// ---------------- TRENDS ----------------
function renderTrends(decks,mu,inWin){
  if(inWin.length<2)return `<div class="empty-state"><b>Not enough days</b>Trends need at least two days of data in the window.</div>`;
  const recentCut=inWin[Math.max(0,inWin.length-2)]; // poslední ~2 dny = "recent"
  const tot={recent:0,earlier:0};
  decks.forEach(d=>{d._r={games:0,wins:0};d._e={games:0,wins:0};for(const[day,x]of Object.entries(d.byDay||{})){const t=day>=recentCut?'_r':'_e';d[t].games+=x.games;d[t].wins+=x.wins;}tot.recent+=d._r.games;tot.earlier+=d._e.games;});
  const rows=decks.map(d=>{const pr=tot.recent?d._r.games/tot.recent:0,pe=tot.earlier?d._e.games/tot.earlier:0;
    const wrR=d._r.games?d._r.wins/d._r.games:null,wrE=d._e.games?d._e.wins/d._e.games:null;
    return {label:d.label,dPlay:pr-pe,pr,pe,rg:d._r.games,eg:d._e.games,wrR,wrE,dWR:(wrR!=null&&wrE!=null)?wrR-wrE:null};}).filter(r=>r.rg+r.eg>=MIN_GAMES);
  const risers=rows.slice().sort((a,b)=>b.dPlay-a.dPlay).slice(0,8);
  const fallers=rows.slice().sort((a,b)=>a.dPlay-b.dPlay).slice(0,8);
  const row=(r,up)=>`<div class="trow" onclick="selDeckGo('${esc(r.label)}')"><div class="nm">${chips(r.label)}<span>${deckName(r.label)}</span></div>
    <div class="sub">${(r.pe*100).toFixed(1)}% → ${(r.pr*100).toFixed(1)}%</div>
    <div class="delta" style="color:${up?'var(--good)':'var(--bad)'}">${r.dPlay>=0?'+':''}${(r.dPlay*100).toFixed(1)}</div></div>`;
  return `<div class="head"><h2>Meta trends</h2><span class="note">play-rate change · recent days vs earlier in the window · click a deck for detail</span></div>
    <div class="trend"><div><h4 class="cols" style="color:var(--good);font:600 10.5px/1 'Spline Sans Mono',monospace;letter-spacing:.16em;text-transform:uppercase;margin:0 0 6px">▲ Rising</h4>${risers.length?risers.map(r=>row(r,1)).join(''):'<div class="ci" style="padding:10px 0">No data.</div>'}</div>
      <div><h4 style="color:var(--bad);font:600 10.5px/1 'Spline Sans Mono',monospace;letter-spacing:.16em;text-transform:uppercase;margin:0 0 6px">▼ Falling</h4>${fallers.length?fallers.map(r=>row(r,0)).join(''):'<div class="ci" style="padding:10px 0">No data.</div>'}</div></div>
    <div class="ci" style="margin-top:16px">Numbers are play-rate share now vs earlier. With a short window the split is coarse; it sharpens as more days accumulate.</div>`;
}

function render(){
  const {deck,mu,inWin}=aggregate();KAPPA=estimateKappa(mu);
  document.getElementById('kappa').textContent=state.smooth?`κ=${KAPPA.toFixed(0)}`:'raw';
  const {decks,total}=computeDecks(deck,mu);
  const root=document.getElementById('content');
  if(total===0){state.selected=null;root.innerHTML=`<div class="empty-state"><b>No games here yet</b>Nothing for this region/format/window. ${state.region!=='all'?'This region may still be filling up.':'Try a wider window.'}</div>`;return;}
  const byLabel=Object.fromEntries(decks.map(d=>[d.label,d]));
  root.innerHTML = state.view==='conquest'?renderConquest(decks,mu):state.view==='trends'?renderTrends(decks,mu,inWin):renderMeta(decks,total,mu,byLabel);
}

window.setSort=k=>{state.sort=k;render();};
window.selDeck=l=>{state.selected=(state.selected===l?null:l);render();if(state.selected)document.querySelector('.detail')?.scrollIntoView({behavior:'smooth',block:'nearest'});};
window.selDeckGo=l=>{state.view='meta';state.selected=l;syncTabs();render();document.querySelector('.detail')?.scrollIntoView({behavior:'smooth',block:'nearest'});};
window.clearSel=()=>{state.selected=null;render();};
window.setRequire=v=>{state.requireDeck=v;render();};
window.setConq=m=>{state.conqMode=m;render();};
window.setLineup=(who,i,v)=>{const arr=who==='my'?(state.myLineup||=['','','']):(state.oppLineup||=['','','']);arr[i]=v;render();};
window.downloadCSV=()=>{const {deck,mu}=aggregate();const {decks}=computeDecks(deck,mu);const rows=[['archetype','games','play_rate','win_rate','ci_low','ci_high','exp_wr_vs_field']];
  decks.sort((a,b)=>b.games-a.games).forEach(d=>rows.push([deckName(d.label)+' '+regionsOf(d.label).join('/'),d.games,(d.play*100).toFixed(2),(d.wr*100).toFixed(1),(d.ciLo*100).toFixed(1),(d.ciHi*100).toFixed(1),d.expWR!=null?(d.expWR*100).toFixed(1):'']));
  const csv=rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`lnd-meta-${state.region}-${state.format}-${state.window||'patch'}d.csv`;a.click();URL.revokeObjectURL(a.href);};

function syncTabs(){document.querySelectorAll('#tabs button').forEach(b=>b.setAttribute('aria-pressed',b.dataset.v===state.view));}
function buildSeg(id,opts,key,cb){const el=document.getElementById(id);el.innerHTML=opts.map(o=>`<button data-v="${o.v}" aria-pressed="${state[key]==o.v}">${o.t}</button>`).join('');
  el.querySelectorAll('button').forEach(b=>b.onclick=()=>{let v=b.dataset.v;if(key==='window')v=v==='patch'?null:Number(v);if(key==='smooth')v=v==='1';state[key]=v;if(key!=='smooth'&&key!=='view')state.selected=null;el.querySelectorAll('button').forEach(x=>x.setAttribute('aria-pressed',x===b));(cb||render)();});}

function init(){
  let tg=0;for(const d of Object.keys(STATS.days||{}))for(const r of Object.values(STATS.days[d]))for(const f of Object.values(r))tg+=Object.values(f.deckGames||{}).reduce((a,b)=>a+b.games,0);
  const upd=STATS.generatedAt?new Date(STATS.generatedAt):null;
  document.getElementById('meta').innerHTML=`<span>Patch <b>${STATS.patchStart||'—'}</b></span><span class="dot">/</span><span><b>${Math.round(tg/2)}</b> matches</span><span class="dot">/</span><span>updated <b>${upd?upd.toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'—'}</b></span>`;
  const regions=STATS.regions||['europe','americas','asia'];
  buildSeg('seg-region',[{v:'all',t:'All'},...regions.map(r=>({v:r,t:REGION_LABEL[r]||r}))],'region');
  buildSeg('seg-format',[{v:'all',t:'All'},{v:'standard',t:'Standard'},{v:'eternal',t:'Eternal'}],'format');
  buildSeg('seg-window',[{v:'2',t:'2d'},{v:'7',t:'7d'},{v:'14',t:'14d'},{v:'patch',t:'Patch'}],'window');
  buildSeg('seg-smooth',[{v:'1',t:'Smoothed'},{v:'0',t:'Raw'}],'smooth');
  buildSeg('tabs',[{v:'meta',t:'Meta'},{v:'conquest',t:'Conquest'},{v:'trends',t:'Trends'}],'view');
  document.getElementById('foot').innerHTML='Riot LoR API · archetypes by champions + regions. <b>Smoothed</b> = empirical-Bayes shrinkage (κ pseudo-games → 50%). <b>Exp WR</b> = win rate vs the average opponent (play-weighted). <b>Conquest</b> tools enforce champion-lock; match win uses a minimax model over deck choice and bans. Small samples = soft numbers; everything sharpens as data grows.';
  render();
}
fetch('./data/stats.json',{cache:'no-store'}).then(r=>r.json()).then(d=>{STATS=d;init();}).catch(e=>{document.getElementById('content').innerHTML=`<div class="empty-state"><b>Couldn't load stats.json</b>${e}</div>`;});
</script>
</body>
